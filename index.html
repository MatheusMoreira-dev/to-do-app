<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>ToDo App</title>
  </head>
  <body>
    <header></header>

    <main>
      <div class="to-do-box">
        <h1 id="to-do-title" contenteditable="true"></h1>

        <div class="tab-status">
          <button id="tab-to-do">
            Pendentes
            <span id="total-to-do"></span>
          </button>

          <button id="tab-completed">
            Concluídas
            <span id="total-completed"></span>
          </button>
        </div>

        <section class="tasks-section">
          <header>
            <h2 id="tasks-section-title"></h2>
            <span id="total-tasks"></span>
          </header>

          <button id="add-task">
            <span class="icon">+</span>
            <span class="name">Adicionar Tarefa</span>
          </button>

          <ul id="list-tasks" class="list-tasks"></ul>
        </section>
      </div>
    </main>

    <footer></footer>
    <script type="module" src="app.js"></script>
  </body>
</html>
