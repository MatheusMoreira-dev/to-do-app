<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="stylesheet" href="style.css" />
    <title>To-do App</title>
  </head>
  <body>
    <header></header>

    <main>
      <div class="to-do-box">
        <h1 id="to-do-title" contenteditable="true"></h1>

        <div class="tab-status">
          <input type="radio" name="tab-active" id="tab-to-do" />

          <label for="tab-to-do">
            <span>Pendentes</span>
            <span id="total-to-do"></span>
          </label>

          <input type="radio" name="tab-active" id="tab-completed" />

          <label id="label-tab-completed" for="tab-completed">
            <span>Concluídas</span>
            <span id="total-completed"></span>
          </label>
        </div>

        <section class="tasks-section">
          <button id="add-task">
            <span class="icon">+</span>
            <span class="name">Adicionar Tarefa</span>
          </button>

          <ol id="list-tasks"></ol>
        </section>
      </div>
    </main>

    <footer></footer>
    <script type="module" src="app.js"></script>
  </body>
</html>
